name: Release Helm Chart

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Fetch latest chart from morgenruf/morgenruf
        run: |
          git clone https://github.com/morgenruf/morgenruf.git /tmp/morgenruf-src
          helm dependency update /tmp/morgenruf-src/app/helm/morgenruf
          helm package /tmp/morgenruf-src/app/helm/morgenruf --destination ./charts

      - name: Generate index.yaml
        run: |
          helm repo index ./charts --url https://charts.morgenruf.dev/charts
          cp ./charts/index.yaml ./index.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update helm chart index [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          cname: charts.morgenruf.dev

      - name: Push to GHCR OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} --password-stdin
          for chart in ./charts/*.tgz; do
            helm push "$chart" oci://ghcr.io/morgenruf/charts
          done
